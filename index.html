<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dodo 助眠 AI 短剧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dodo: {
                            dark: '#0f172a',
                            card: '#1e293b'
                        }
                    }
                }
            }
        };
    </script>
    <style>
        body { overflow: hidden; }

        .star-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }

        .bubble-node {
            position: absolute;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.15s ease-out;
            will-change: transform, opacity;
            z-index: 10;
        }

        .star-container.has-hover .bubble-node {
            transform: translate(-50%, -50%) scale(0.85);
            opacity: 0.4;
            filter: grayscale(30%);
            z-index: 5;
        }

        .star-container.has-hover .bubble-node.is-active {
            transform: translate(-50%, -50%) scale(1.15);
            opacity: 1;
            filter: grayscale(0);
            z-index: 20;
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.2), 0 15px 15px -5px rgba(0, 0, 0, 0.1);
        }

        .route-status {
            position: fixed;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%);
            z-index: 60;
            max-width: calc(100vw - 2rem);
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.92);
            color: #fff;
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.22);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .dark .route-status {
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dodo-dark text-gray-800 dark:text-gray-200 transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <header class="w-full bg-transparent px-6 py-5 flex justify-between items-center z-50 absolute top-0">
        <div>
            <h1 class="text-4xl font-black tracking-tight text-gray-900 dark:text-white">dodo.</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 font-bold tracking-widest uppercase mt-1">Sleepy AI Drama Router</p>
        </div>
        <button id="themeToggle" class="w-10 h-10 rounded-full bg-white dark:bg-dodo-card shadow-md flex items-center justify-center focus:outline-none hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="切换深色模式">
            ☾
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-4 relative z-10 w-full mt-10">
        <div id="starField" class="star-container"></div>
    </main>

    <div id="routeStatus" class="route-status" aria-live="polite"></div>

    <script>
        const routerPool = {
            '末世极寒': [
                { platform: 'bilibili', title: '助眠、已完结：极寒末世大雪封山', url: 'https://www.bilibili.com/video/BV1LVADztEym/' },
                { platform: 'bilibili', title: '助眠故事：在极寒末日下有一间安全屋', url: 'https://www.bilibili.com/video/BV1Qz2vBiEcL/' },
                { platform: 'bilibili', title: '一口气看完我在末世打造安全屋', url: 'https://www.bilibili.com/video/BV1YkqeBGEJN/' },
                { platform: 'bilibili', title: '一口气看完末日求生超长合集睡觉版', url: 'https://www.bilibili.com/video/BV1GxrtBeETf/' }
            ],
            '丧尸爆发': [
                { platform: 'bilibili', title: '原创 AI 真人睡前小故事：执念尸', url: 'https://www.bilibili.com/video/BV1SYckz9Exz/' },
                { platform: 'bilibili', title: '连续叙事原创丧尸末日 AI 剧集：末世月光', url: 'https://www.bilibili.com/video/BV15Z89zMEY4/' },
                { platform: 'bilibili', title: '助眠双语字幕：丧尸末日外出寻找物资', url: 'https://www.bilibili.com/video/BV16i421y7ij/' },
                { platform: 'bilibili', title: '末世系列小说合集：AI 合成助眠向', url: 'https://www.bilibili.com/video/BV1ku1VBXEmU/' }
            ],
            '我重生了': [
                { platform: 'bilibili', title: 'AI 助眠故事：重生之我在末世开动物园', url: 'https://www.bilibili.com/video/BV19CvyBeETU/' },
                { platform: 'bilibili', title: '极寒末世来临，我重生后疯狂囤货', url: 'https://www.bilibili.com/video/BV1HVsKzNESE/' },
                { platform: 'bilibili', title: '末日求生超长合集睡觉版：重生归来', url: 'https://www.bilibili.com/video/BV1GxrtBeETf/' },
                { platform: 'bilibili', title: '末世系列小说合集：AI 合成助眠向', url: 'https://www.bilibili.com/video/BV1ku1VBXEmU/' }
            ],
            '玄幻修仙': [
                { platform: 'bilibili', title: '国风 AI 修仙传：解压助眠', url: 'https://www.bilibili.com/video/BV172WYzeEWa/' },
                { platform: 'bilibili', title: 'AI 奇幻修仙短剧：万道龙尊', url: 'https://www.bilibili.com/video/BV1YJSeB3E2B/' },
                { platform: 'bilibili', title: '玄幻修仙有声便利店助眠合集', url: 'https://www.bilibili.com/video/BV1Nz421m7BP/' },
                { platform: 'bilibili', title: '修真有声便利店助眠合集', url: 'https://www.bilibili.com/video/BV1si421S7fR/' }
            ],
            '穿越种田': [
                { platform: 'bilibili', title: '穿越古代种田农女完结动画短片', url: 'https://www.bilibili.com/video/BV1ezM8z2Egr/' },
                { platform: 'bilibili', title: '人在古代，系统给我发补贴：完结种田', url: 'https://www.bilibili.com/video/BV1YQx1zvE1i/' },
                { platform: 'bilibili', title: '穿越回古代，从种田开始', url: 'https://www.bilibili.com/video/BV1ze411E7Ru/' },
                { platform: 'bilibili', title: '穿越两界种田：有声助眠合集', url: 'https://www.bilibili.com/video/BV1Nz421m7BP/' }
            ]
        };

        const topology = [
            { id: 'cat1', label: '末世极寒', color: 'from-blue-500 to-cyan-400', left: '50%', top: '8%' },
            { id: 'cat2', label: '丧尸爆发', color: 'from-red-600 to-orange-500', left: '89.9%', top: '37%' },
            { id: 'cat3', label: '我重生了', color: 'from-purple-600 to-indigo-500', left: '74.7%', top: '84%' },
            { id: 'cat4', label: '玄幻修仙', color: 'from-emerald-500 to-teal-400', left: '25.3%', top: '84%' },
            { id: 'cat5', label: '穿越种田', color: 'from-amber-500 to-yellow-400', left: '10.1%', top: '37%' }
        ];

        const DOM = {
            html: document.documentElement,
            themeToggle: document.getElementById('themeToggle'),
            starField: document.getElementById('starField'),
            routeStatus: document.getElementById('routeStatus')
        };

        let isRouting = false;

        DOM.themeToggle.addEventListener('click', () => {
            DOM.html.classList.toggle('dark');
        });

        function initNodes() {
            const fragment = document.createDocumentFragment();

            topology.forEach(node => {
                const bubble = document.createElement('button');
                bubble.type = 'button';
                bubble.className = `bubble-node flex items-center justify-center w-28 h-28 md:w-36 md:h-36 rounded-full bg-gradient-to-br ${node.color} text-white shadow-lg focus:outline-none border-4 border-white/20 dark:border-dodo-dark/50 cursor-pointer`;
                bubble.style.left = node.left;
                bubble.style.top = node.top;
                bubble.setAttribute('aria-label', `随机播放${node.label}助眠 AI 短剧`);
                bubble.innerHTML = `<span class="text-base md:text-lg font-bold tracking-widest drop-shadow-md pointer-events-none">${node.label}</span>`;

                bubble.addEventListener('mouseenter', () => {
                    DOM.starField.classList.add('has-hover');
                    bubble.classList.add('is-active');
                });

                bubble.addEventListener('mouseleave', () => {
                    DOM.starField.classList.remove('has-hover');
                    bubble.classList.remove('is-active');
                });

                bubble.addEventListener('click', () => executeJump(node.label, bubble));

                fragment.appendChild(bubble);
            });

            DOM.starField.appendChild(fragment);
        }

        function showStatus(message) {
            DOM.routeStatus.textContent = message;
            DOM.routeStatus.style.opacity = '1';
        }

        function hideStatus(delay = 1400) {
            window.setTimeout(() => {
                DOM.routeStatus.style.opacity = '0';
            }, delay);
        }

        function shuffle(list) {
            return [...list]
                .map(item => ({ item, order: Math.random() }))
                .sort((a, b) => a.order - b.order)
                .map(entry => entry.item);
        }

        function extractBvid(url) {
            const match = String(url).match(/bilibili\.com\/video\/(BV[\w]+)/i);
            return match ? match[1] : '';
        }

        function isAllowedPlaybackUrl(url) {
            try {
                const parsed = new URL(url);
                return parsed.protocol === 'https:' &&
                    parsed.hostname === 'www.bilibili.com' &&
                    /^\/video\/BV[\w]+\/?$/i.test(parsed.pathname);
            } catch {
                return false;
            }
        }

        function isPlayableBilibiliPayload(payload, bvid) {
            const data = payload && payload.data;
            return payload &&
                payload.code === 0 &&
                data &&
                data.bvid === bvid &&
                data.title &&
                Number(data.duration) > 0 &&
                Number(data.state || 0) >= 0;
        }

        function verifyWithJsonp(apiUrl, timeout = 4500) {
            return new Promise((resolve) => {
                const callbackName = `__dodoVideoCheck_${Date.now()}_${Math.random().toString(16).slice(2)}`;
                const script = document.createElement('script');
                const joiner = apiUrl.includes('?') ? '&' : '?';
                let settled = false;

                function finish(result) {
                    if (settled) return;
                    settled = true;
                    window.clearTimeout(timer);
                    delete window[callbackName];
                    script.remove();
                    resolve(result);
                }

                window[callbackName] = payload => finish(payload);
                script.onerror = () => finish(null);
                script.src = `${apiUrl}${joiner}jsonp=jsonp&callback=${callbackName}`;

                const timer = window.setTimeout(() => finish(null), timeout);
                document.body.appendChild(script);
            });
        }

        async function verifyTargetVideo(targetVideo) {
            if (!targetVideo || !targetVideo.url || !isAllowedPlaybackUrl(targetVideo.url)) {
                return false;
            }

            const bvid = extractBvid(targetVideo.url);
            if (!bvid) {
                return false;
            }

            const apiUrl = `https://api.bilibili.com/x/web-interface/view?bvid=${encodeURIComponent(bvid)}`;
            const payload = await verifyWithJsonp(apiUrl);
            return isPlayableBilibiliPayload(payload, bvid);
        }

        async function executeJump(categoryKey, sourceButton) {
            if (isRouting) return;

            const pool = routerPool[categoryKey];
            if (!Array.isArray(pool) || pool.length === 0) {
                console.warn(`资源池命中失败：${categoryKey}`);
                return;
            }

            isRouting = true;
            sourceButton.disabled = true;
            sourceButton.classList.add('opacity-70');
            showStatus('正在核查视频...');

            try {
                const candidates = shuffle(pool);

                for (let index = 0; index < candidates.length; index += 1) {
                    const targetVideo = candidates[index];
                    showStatus(`正在核查 ${index + 1}/${candidates.length}`);

                    if (await verifyTargetVideo(targetVideo)) {
                        showStatus('核查通过，正在打开视频...');
                        window.location.assign(targetVideo.url);
                        return;
                    }
                }

                console.warn(`该分类暂无可播放视频：${categoryKey}`);
                showStatus('这个分类暂时没有可播放视频');
                hideStatus();
            } finally {
                sourceButton.disabled = false;
                sourceButton.classList.remove('opacity-70');
                isRouting = false;
            }
        }

        initNodes();
    </script>
</body>
</html>
